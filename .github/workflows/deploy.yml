name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create .env file on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            cat > ~/.env.girin << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            if [ ! -d ~/girin_server ]; then
              git clone https://github.com/whai2/girin-web-back.git ~/girin_server
            fi
            cd ~/girin_server
            git pull origin main
            docker stop $(docker ps -q) || true
            docker rm $(docker ps -aq) || true
            docker build -t girin-server .
            docker run -d \
              --name girin-server \
              -p 4000:4000 \
              --env-file ~/.env.girin \
              girin-server
